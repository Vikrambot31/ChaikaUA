name: Chaika Morning News

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  publish-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish morning news
        env:
          RUN_MODE: once
          POST_TYPE: news
          FORCE_FEED_SYNC: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_PROVIDER: anthropic
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run once

      - name: Commit feed updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json data/published-news.json data/daily-run.json || true
          git diff --cached --quiet || git commit -m "update morning feed"
          git push
